description: >-
  Amadeus is a leading technology partner for the global travel industry,
  providing technology solutions for airlines, airports, hotels, travel sellers,
  and corporate travel. The Amadeus platform includes a global distribution
  system (GDS), passenger service systems, airport operations, hospitality
  management, and a suite of APIs enabling developers to search, price, book,
  and manage travel across air, hotel, and ground transportation.
