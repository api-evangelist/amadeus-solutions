  - type: Solutions
    data:
      - name: Amadeus Nevio (Airline Retailing)
        description: >-
          Next-generation airline retailing platform enabling offer and order
          management for airlines pursuing NDC-based retailing strategies.
      - name: Amadeus Altéa (Passenger Service System)
        description: >-
          Core passenger service system for full-service carriers providing
          reservations, inventory management, and departure control.
      - name: Amadeus Selling Platform Connect
        description: >-
          Distribution platform for travel agencies providing GDS access,
          NDC content, and LCC integrations through a unified API.
      - name: Amadeus Cytric (Corporate Travel)
        description: >-
          Corporate travel and expense management platform integrated with
          Microsoft Teams and major enterprise collaboration tools.
      - name: Amadeus Airport IT
        description: >-
          Airport operations technology including baggage, passenger
          experience, ground handling, and border control solutions.
  - type: Features
    data:
      - name: Global Flight Inventory
        description: >-
          Access flight schedules and availability from over 400 airlines
          through a single integration with the Amadeus GDS.
      - name: NDC Content Support
        description: >-
          Connect to airline NDC offers alongside traditional GDS content
          for a comprehensive view of available fares and ancillaries.
      - name: Branded Fares and Fare Families
        description: >-
          Display branded fare options with included services, restrictions,
          and price differences to enable informed purchase decisions.
      - name: Ancillary Services
        description: >-
          Access seat selection, baggage, meals, and other ancillary
          services through integrated APIs alongside fare shopping.
      - name: Real-Time Pricing
        description: >-
          Confirm current pricing and availability before booking with the
          Flight Offers Price API to prevent pricing discrepancies.
  - type: UseCases
    data:
      - name: Flight Search and Booking Engine
        description: >-
          Build complete flight shopping experiences searching, pricing, and
          booking flights across hundreds of airlines through a unified API.
      - name: Airline Retailing Platform
        description: >-
          Power airline direct channels with offer creation, branded fares,
          seat maps, and ancillary upsell capabilities.
      - name: Corporate Travel Management
        description: >-
          Enable policy-compliant flight shopping for corporate travelers with
          fare filtering, approval workflows, and reporting.
      - name: Travel Metasearch
        description: >-
          Aggregate flight offers for price comparison across airlines with
          detailed fare family and service information.
      - name: AI Travel Assistant
        description: >-
          Enable conversational travel assistants to search and compare
          flights using natural language queries.
  - type: Integrations
    data:
      - name: Amadeus Flight Create Orders
        description: >-
          Convert searched and priced flight offers into confirmed bookings
          using the Flight Create Orders API.
      - name: Amadeus Hotel Search
        description: >-
          Combine flight search with hotel search to build complete trip
          planning experiences for travelers.
      - name: Amadeus Points of Interest
        description: >-
          Enhance destination content alongside flight search with
          attractions, experiences, and activities data.
      - name: Amadeus Transfer Search
        description: >-
          Add ground transportation options to flight itineraries through
          the Transfer Search API.
      - name: Outpayce (Payments)
        description: >-
          Integrate travel payments processing through Amadeus Outpayce for
          airline and OTA payment acceptance.
